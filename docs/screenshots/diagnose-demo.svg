<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <style>
    .bg { fill: #0d1117; }
    .chrome { fill: #161b22; }
    .dot-r { fill: #ff5f56; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #27c93f; }
    .title { fill: #8b949e; font-size: 12px; }
    .fg { fill: #c9d1d9; }
    .muted { fill: #6e7681; }
    .bold { font-weight: 700; fill: #f0f6fc; }
    .red { fill: #ff7b72; }
    .green { fill: #7ee787; }
    .yellow { fill: #f2cc60; }
    .blue { fill: #79c0ff; }
    .magenta { fill: #d2a8ff; }
    .cyan { fill: #56d4dd; }
    .pink { fill: #ffa198; }
    .label { fill: #8b949e; }
  </style>

  <!-- window -->
  <rect class="bg" width="860" height="680" rx="8"/>
  <rect class="chrome" width="860" height="28" rx="8"/>
  <rect class="chrome" y="20" width="860" height="8"/>
  <circle class="dot-r" cx="16" cy="14" r="5"/>
  <circle class="dot-y" cx="32" cy="14" r="5"/>
  <circle class="dot-g" cx="48" cy="14" r="5"/>
  <text class="title" x="430" y="18" text-anchor="middle">agentguard diagnose-claude-session</text>

  <g transform="translate(20 50)">
    <!-- prompt + command -->
    <text y="0"><tspan class="green">$</tspan><tspan class="fg" dx="6">agentguard diagnose-claude-session </tspan><tspan class="cyan">7f3a2c1e</tspan></text>

    <!-- header -->
    <text y="30"><tspan class="bold">━━━ AGENTGUARD DIAGNOSE ━━━</tspan><tspan class="muted" dx="8">session 7f3a2c1e · 34 spans · 18.4s</tspan></text>

    <!-- key-value block -->
    <text y="60"><tspan class="label">  task     </tspan><tspan class="fg">refactor auth module + add rate limiting</tspan></text>
    <text y="80"><tspan class="label">  status   </tspan><tspan class="green">● completed</tspan><tspan class="muted" dx="6">(12 tool calls, 0 retries)</tspan></text>
    <text y="100"><tspan class="label">  grade    </tspan><tspan class="green">B+</tspan><tspan class="muted" dx="6">(efficiency 0.71, coverage 0.88)</tspan></text>
    <text y="120"><tspan class="label">  cost     </tspan><tspan class="yellow">cost=$0.0834</tspan><tspan class="muted" dx="6">· in 18.2k tok · out 4.1k tok</tspan></text>
    <text y="140"><tspan class="label">  bottleneck </tspan><tspan class="magenta">bottleneck=span:a91f</tspan><tspan class="muted" dx="6">grep across node_modules (6.2s own-time)</tspan></text>

    <!-- section: failures -->
    <text y="176"><tspan class="blue">▸ [failures]</tspan><tspan class="muted" dx="6">─────────────────────────────────────────────</tspan></text>
    <text y="196"><tspan class="muted">  failed_spans=</tspan><tspan class="fg">1</tspan><tspan class="muted" dx="8">·</tspan><tspan class="muted" dx="4">recovered=</tspan><tspan class="green">1</tspan></text>
    <text y="216"><tspan class="red">  ⚠ span:c7d2</tspan><tspan class="fg" dx="4">Edit</tspan><tspan class="muted" dx="6">src/auth/middleware.ts  →</tspan><tspan class="red" dx="4">string not found</tspan></text>
    <text y="236"><tspan class="muted">    retry span:c7d3</tspan><tspan class="green" dx="4">✓ recovered</tspan><tspan class="muted" dx="6">(Read → Edit with correct context)</tspan></text>

    <!-- section: context -->
    <text y="272"><tspan class="blue">▸ [context]</tspan><tspan class="muted" dx="6">──────────────────────────────────────────────</tspan></text>
    <text y="292"><tspan class="muted">  handoffs=</tspan><tspan class="fg">3</tspan><tspan class="muted" dx="8">·</tspan><tspan class="muted" dx="4">context_loss_events=</tspan><tspan class="fg">0</tspan></text>
    <text y="312"><tspan class="cyan">  planner</tspan><tspan class="muted" dx="4">→</tspan><tspan class="cyan" dx="4">coder</tspan><tspan class="muted" dx="4">→</tspan><tspan class="cyan" dx="4">reviewer</tspan><tspan class="muted" dx="8">all handoffs carried task spec ✓</tspan></text>

    <!-- section: cost-yield -->
    <text y="348"><tspan class="blue">▸ [cost-yield]</tspan><tspan class="muted" dx="6">───────────────────────────────────────────</tspan></text>
    <text y="368"><tspan class="muted">  yield=</tspan><tspan class="green">0.72</tspan><tspan class="muted" dx="8">·</tspan><tspan class="muted" dx="4">wasteful_spans=</tspan><tspan class="yellow">2</tspan></text>
    <text y="388"><tspan class="yellow">  🔥 span:a91f</tspan><tspan class="fg" dx="4">Grep</tspan><tspan class="muted" dx="6">pattern="useAuth" path=.  →</tspan><tspan class="yellow" dx="4">$0.021 / 0 matches</tspan></text>
    <text y="408"><tspan class="muted">    hint:</tspan><tspan class="fg" dx="4">scope to src/ (excludes node_modules)</tspan></text>

    <!-- section: decisions -->
    <text y="444"><tspan class="blue">▸ [decisions]</tspan><tspan class="muted" dx="6">────────────────────────────────────────────</tspan></text>
    <text y="464"><tspan class="muted">  decisions=</tspan><tspan class="fg">4</tspan><tspan class="muted" dx="8">·</tspan><tspan class="muted" dx="4">reversed=</tspan><tspan class="fg">0</tspan></text>
    <text y="484"><tspan class="green">  ✓ span:1a04</tspan><tspan class="fg" dx="4">chose token-bucket over sliding-window</tspan><tspan class="muted" dx="6">(cited RFC draft)</tspan></text>
    <text y="504"><tspan class="green">  ✓ span:2b17</tspan><tspan class="fg" dx="4">extracted RateLimiter class</tspan><tspan class="muted" dx="6">(reviewer approved)</tspan></text>

    <!-- section: artifacts -->
    <text y="540"><tspan class="blue">▸ [artifacts]</tspan><tspan class="muted" dx="6">────────────────────────────────────────────</tspan></text>
    <text y="560"><tspan class="muted">  📄 trace </tspan><tspan class="fg">/tmp/agentguard/7f3a2c1e.trace.json</tspan><tspan class="muted" dx="6">(214 KB)</tspan></text>
    <text y="580"><tspan class="muted">  🌐 html  </tspan><tspan class="fg">/tmp/agentguard/7f3a2c1e.report.html</tspan><tspan class="muted" dx="6">(open in browser)</tspan></text>

    <!-- prompt -->
    <text y="605"><tspan class="green">$</tspan><tspan class="fg" dx="6">_</tspan></text>
  </g>
</svg>
